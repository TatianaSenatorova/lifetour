<!DOCTYPE html>
<html class="page" lang="ru" data-validate="html">

<head>
  <meta charset="UTF-8">

  <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png">

  <link rel="manifest" href="/favicons/site.webmanifest">
  <title>Lifetour</title>
  <meta name="description"
  content="Фирма по организации походов в горы Lifetour. Предварительное обучение у профессиональных инструкторов. Предоставляем надежное оборудование и снаряжение. Опытные гиды. Индивидуальные туры.">
  <link rel="stylesheet" href="sass/style.scss">
  <link rel="preload" href="fonts/montserrat/Montserrat-Regular.woff2" type="font/woff2" as="font" crossorigin="anonymous">

<body class="page__body">
  <header class="main-header" data-test="header">
    <div class="container">
      <div class="main-header__content">
        <nav class="main-header__main-nav">
          <button class="main-header__burger" type="button">
            <span class="visually-hidden">Открыть меню</span>
            <svg class="main-header__burger-icon" aria-hidden="true" focusable="false" width="26" height="26">
              <use href="/__spritemap#sprite-burger-menu"></use>
            </svg>
            <span class="visually-hidden">Закрыть меню</span>
            <svg class="main-header__close-icon" aria-hidden="true" focusable="false" width="26" height="26">
              <use href="/__spritemap#sprite-close-menu">></use>
            </svg>
          </button>
          <div class="main-header__nav-wrapper">
            <ul class="main-header__nav-list">
              <!-- Чтобы отобразить ссылку в состоянии disable надо добавить класс-модификатор is-disabled к элементу с классом main-header__link. -->
              <li class="main-header__nav-item">
                <a class="main-header__link main-header__link--current" href="#tours">
                  Туры
                </a>
              </li>
              <li class="main-header__nav-item">
                <a class="main-header__link" href="#training">
                  Обучение
                </a>
              </li>
              <li class="main-header__nav-item">
                <a class="main-header__link" href="#about">
                  О&nbsp;нас
                </a>
              </li>
              <li class="main-header__nav-item">
                <a class="main-header__link" href="#reviews">
                  Отзывы
                </a>
              </li>
              <li class="main-header__nav-item">
                <a class="main-header__link" href="#gallery">
                  Фотографии
                </a>
              </li>
              <li class="main-header__nav-item">
                <a class="main-header__link" href="#contacts">
                  Контакты
                </a>
              </li>
            </ul>
          </div>
        </nav>

        <a class="main-header__logo logo">
          <picture>
            <source media="(min-width: 1440px)" width="205" height="62" type="image/svg+xml"
              srcset="img/logo-light-desktop.svg">
            <img src="img/logo-light-mobile.svg" alt="Логотип компании Lifetour" width="142" height="42">
          </picture>
        </a>
        <!-- Чтобы отобразить ссылку в состоянии disable надо добавить класс-модификатор is-disabled к элементу с классом main-header__phone. -->
        <a class="main-header__phone" href="tel:+78000000000">8&nbsp;800 000-00-00</a>
      </div>
    </div>
  </header>
  <main class="main-content">
    <section class="hero" data-test="hero">

    </section>
  </main>
  <footer class="main-footer">
    <div class="container">

    </div>
  </footer>
